# Zsh configuration
name = "zsh"
description = "Zsh shell with antigen plugin manager"
install_method = "package"

[package]
apt = "zsh"
dnf = "zsh"
pacman = "zsh"
zypper = "zsh"

[files]
"files/zshrc" = "~/.zshrc"

[post_install]
commands = [
    "mkdir -p ~/.local/bin",
    "curl -L https://git.io/antigen > ~/.local/bin/antigen.zsh"
]

[[options.prompts]]
name = "theme"
type = "select"
message = "Prompt theme"
default = "robbyrussell"
choices = ["robbyrussell", "agnoster", "pure", "redhat"]

[[options.prompts]]
name = "plugins"
type = "multi_select"
message = "Enable plugins"
default = ["autosuggestions", "syntax-highlighting"]
choices = ["autosuggestions", "syntax-highlighting", "z", "docker", "git"]