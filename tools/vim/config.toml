# Vim configuration
name = "vim"
description = "Vim editor with vim-plug"
install_method = "package"

[package]
apt = "vim"
dnf = "vim-enhanced"
pacman = "vim"
zypper = "vim"

[files]
"files/vimrc" = "~/.vimrc"

[post_install]
commands = [
    "curl -fLo ~/.vim/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim",
    "vim +PlugInstall +qall"
]

[[options.prompts]]
name = "theme"
type = "select"
message = "Color theme"
default = "default"
choices = ["default", "gruvbox", "solarized", "nord"]

[[options.prompts]]
name = "line_numbers"
type = "confirm"
message = "Show line numbers"
default = true