# {# Generated by envsetup #}
# Tmux configuration

{% set prefix_key = config.prefix | default(value="C-b") %}
{% set enable_mouse = config.mouse | default(value=true) %}

# Prefix key
{% if prefix_key == "C-a" %}
set -g prefix C-a
unbind C-b
bind C-a send-prefix
{% else %}
set -g prefix C-b
{% endif %}

# Basic settings
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g status-position bottom
set -g status-interval 5

{% if enable_mouse %}
# Mouse support
set -g mouse on
{% endif %}

# Split panes
bind | split-window -h
bind - split-window -v

# Navigate panes with Alt+arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload config
bind r source-file ~/.tmux.conf \\; display "Config reloaded!"

# Status bar
set -g status-bg black
set -g status-fg white
set -g status-left-length 30
set -g status-left '#[fg=green](#S) '
set -g status-right '#[fg=yellow]%H:%M %Y-%m-%d'

# Window status
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=black,bg=green]#I:#W'

# Pane border
set -g pane-border-fg colour238
set -g pane-active-border-fg green