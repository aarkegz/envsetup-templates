# NVM (Node Version Manager)
name = "nvm"
description = "Node.js version manager"
install_method = "script"

[package]

[files]

script = "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash"

[[options.prompts]]
name = "node_version"
type = "select"
message = "Default Node.js version"
default = "lts"

[[options.prompts.choices]]
"lts" = "LTS (Recommended)"
"latest" = "Latest"
"none" = "Don't install Node.js"