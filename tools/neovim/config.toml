# Neovim configuration
name = "neovim"
description = "Neovim editor with lazy.nvim"
install_method = "package"

[package]
apt = "neovim"
dnf = "neovim"
pacman = "neovim"
zypper = "neovim"

[files]
"files/init.lua" = "~/.config/nvim/init.lua"

[post_install]
commands = [
    "rm -rf ~/.local/share/nvim/lazy/lazy.nvim",
    "git clone --filter=blob:none https://github.com/folke/lazy.nvim.git --branch=stable ~/.local/share/nvim/lazy/lazy.nvim"
]

[[options.prompts]]
name = "theme"
type = "select"
message = "Color theme"
default = "everforest"

[[options.prompts.choices]]
"everforest" = "everforest"
"tokyonight" = "tokyonight"
"catppuccin" = "catppuccin"
"gruvbox" = "gruvbox"

[[options.prompts]]
name = "lsp"
type = "confirm"
message = "Enable LSP support"
default = true